<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TPC360 Doc">
<meta name="theme-color" content="#0B1F3A">
<title>TPC360 · Docentes</title>
<link rel="manifest" href="manifest-docente.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  body { margin: 0; background: #0B1F3A; display: flex; align-items: center; justify-content: center; height: 100vh; }
  .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,.2); border-top-color: #00897B; border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <div class="spinner"></div>
  <script>
    const hash   = window.location.hash;
    const search = window.location.search;
    const isOAuth = hash.includes('access_token') || search.includes('code=');

    if (isOAuth) {
      // Viene de Google OAuth — guardar rol y redirigir preservando parámetros
      localStorage.setItem('tpc360_role', 'teacher');
      window.location.replace('index.html' + search + hash);
    } else {
      // Acceso normal
      window.location.replace('index.html#docente');
    }
  </script>
</body>
</html>
